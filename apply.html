<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Admission Form | SuccessGate Montessori</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fa;
color:#333;
}

header{
background:#002f6c;
color:white;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:70px;
}

.hero{
height:40vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('file_000000001a7871f4834b639656bbe1b4.png');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h2{
font-size:3rem;
}

.form-section{
padding:60px 8%;
}

.form-container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
max-width:800px;
margin:auto;
}

.form-container h3{
text-align:center;
color:#002f6c;
margin-bottom:25px;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#002f6c;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0046a8;
}

footer{
background:#00163a;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="IMG-20260401-WA0032.jpg" alt="Logo">

<div>
<h2>SuccessGate Montessori</h2>
<p>The Undoubtable Success</p>
</div>

</div>

</header>

<section class="hero">

<div>
<h2>Online Admission Form</h2>
<p>Apply for Admission at SuccessGate Montessori</p>
</div>

</section>

<section class="form-section">

<div class="form-container">

<h3>Admission Application Form</h3>

<form action="https://formspree.io/f/mbdvjwjg" method="POST">

<label>Child's Full Name</label>
<input type="text" name="child_name" required>

<label>Date of Birth</label>
<input type="date" name="date_of_birth" required>

<label>Class Applying For</label>
<select name="class_applying_for" required>
<option>Creche</option>
<option>Nursery</option>
<option>Kindergarten</option>
<option>Primary</option>
<option>JHS</option>
</select>

<label>Parent/Guardian Name</label>
<input type="text" name="parent_name" required>

<label>Phone Number</label>
<input type="tel" name="phone_number" required>

<label>Email Address</label>
<input type="email" name="email_address">

<label>Home Address</label>
<textarea name="home_address" rows="3"></textarea>

<label>Additional Information</label>
<textarea name="additional_information" rows="5"></textarea>

<button type="submit">
Submit Application
</button>

</form>

</div>

</section>

<footer>

<p>
© 2025 SuccessGate Montessori | The Undoubtable Success
</p>

</footer>

</body>
  </html>
